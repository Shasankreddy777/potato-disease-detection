<!DOCTYPE html>
<html>
<head>
    <title>Potato Disease Detection</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .card {
            width: 90%;
            max-width: 400px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        button {
            background: red;
            padding: 10px 20px;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        img.preview {
            width: 100%;
            max-width: 250px;
            margin-top: 15px;
            border-radius: 10px;
        }

        .result {
            margin-top: 15px;
            font-size: 20px;
            color: #00ffcc;
        }

        .solution {
            margin-top: 10px;
            color: #ffd700;
        }
    </style>
</head>

<body>

<h1>🥔 Potato Disease Detection</h1>

<div class="card">

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required><br>
        <button type="submit">Upload & Predict</button>
    </form>

    {% if prediction %}
        <img src="{{ image_path }}" class="preview">

        <div class="result">
            Result: {{ prediction }}
        </div>

        <div class="solution">
            {{ solution }}
        </div>
    {% endif %}

</div>

</body>
</html>
